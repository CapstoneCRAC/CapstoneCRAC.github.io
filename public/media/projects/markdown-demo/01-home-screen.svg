  <rect width="960" height="720" fill="#edf5ee"/>
  <rect x="96" y="84" width="768" height="552" rx="18" fill="#ffffff" stroke="#c8d8ca" stroke-width="3"/>
  <text x="144" y="160" fill="#143b2b" font-family="Arial, sans-serif" font-size="46" font-weight="700">Mandarin Practice</text>
